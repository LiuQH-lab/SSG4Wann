[project]
name = "ssg4wann"
version = "0.99.9"
description = "A parallel (MPI-enabled) tool for symmetrizing Wannier tight-binding Hamiltonians (`_hr.dat`) generated from Wannier90, with oriented spin space group."
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Zehao Ji", email = "nitreneg@gmail.com" }]
maintainers = [{ name = "Zehao Ji", email = "nitreneg@gmail.com" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "findspingroup>=0.13.18",
    "numpy>=1.26.0",
    "pandas>=2.0.0",
    "scipy>=1.11.2",
    "tqdm>=4.62.0",
    
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License", 
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Physics",
]
[project.optional-dependencies]
mpi = ["mpi4py>=3.1.0"]

[project.urls]
Homepage = "https://github.com/LiuQH-lab/SSG4Wann"
Repository = "https://github.com/LiuQH-lab/SSG4Wann"
Issues = "https://github.com/LiuQH-lab/SSG4Wann/issues"

[tool.setuptools.dynamic]
version = {attr = "ssg4wann.version.__version__"}



keywords = ["wannier90", "tight-binding", "magnetic_symmetry", "oriented_spin_space_group", "parallel_computing"]
[project.scripts]
ssg4wann = 'ssg4wann.cli:ssg4wann'
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ssg4wann"]
