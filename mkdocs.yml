site_name: SSG4Wann Documentation
site_description: Documentation for symmetrizing Wannier tight-binding Hamiltonians with oriented spin space group symmetry.
site_url: https://ssg4wann.readthedocs.io/en/latest/

repo_name: LiuQH-lab/SSG4Wann
repo_url: https://github.com/LiuQH-lab/SSG4Wann
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Examples: examples.md
  - MPI and HPC: mpi-hpc.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search

copyright: Copyright &copy; SSG4Wann contributors
